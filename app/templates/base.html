<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Seravops — deployment recipe orchestration platform">
    <title>{% block title %}Seravops{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  </head>
  <body>
    <header>
      <a class="brand" href="/services">⚡ Seravops</a>
      {% if current_user %}
        <nav class="header-nav">
          <a href="/services" class="nav-link">Services</a>
          {% if current_user.role.value == 'admin' %}
          <a href="/users" class="nav-link">Users</a>
          {% endif %}
        </nav>
        <div class="account">
          <span class="role-badge {% if current_user.role.value == 'admin' %}admin{% endif %}">{{ current_user.role.value }}</span>
          <span>{{ current_user.username }}</span>
          <form action="/logout" method="post"><button class="link" type="submit">Log out</button></form>
        </div>
      {% endif %}
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
